version: 2
project_name: cc-mux

before:
  hooks:
    - go mod tidy

builds:
  - id: cc-mux
    main: .
    binary: cc-mux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Lucklyric/cc-mux/internal/cli.version={{ .Version }}
      - -X github.com/Lucklyric/cc-mux/internal/cli.commit={{ .Commit }}
      - -X github.com/Lucklyric/cc-mux/internal/cli.date={{ .Date }}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: Lucklyric
    name: cc-mux

changelog:
  use: github
  sort: asc
